<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Compass · discovery workspace</title>
<style>
  :root{
    --bg:#0a0a0f;--panel:#101017;--panel2:#15151f;--ink:#edecf5;--mut:#9a96b4;--faint:#6b6788;
    --line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.13);
    --acc:#8b6dff;--acc2:#5b8cff;--llm:#ff8fb1;--code:#52e0a4;--gold:#ffcf66;--hit:#36d399;--shared:#5b9cff;--spend:#ff9a4d;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font:13.5px/1.55 ui-sans-serif,-apple-system,"Segoe UI",Roboto,sans-serif;overflow:hidden}
  button{font:inherit;cursor:pointer;color:inherit}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:6px}
  #wrap{display:flex;flex-direction:column;height:100%}
  /* top app bar */
  .appbar{display:flex;align-items:center;gap:12px;padding:9px 16px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#13131c,#0e0e15)}
  .logo{display:flex;align-items:center;gap:9px;font-weight:650;letter-spacing:.2px}
  .logo .mark{width:22px;height:22px;border-radius:7px;background:conic-gradient(from 130deg,#8b6dff,#5b8cff,#52e0a4,#8b6dff)}
  .crumb{color:var(--faint);font-size:12.5px}.crumb b{color:var(--mut);font-weight:500}
  .livechip{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--mut);background:rgba(54,211,153,.08);border:1px solid rgba(54,211,153,.25);padding:3px 10px;border-radius:999px}
  .livechip .led{width:8px;height:8px;border-radius:50%;background:#36d399;box-shadow:0 0 8px #36d399}
  .livechip .led.off{background:#ff6b6b;box-shadow:0 0 8px #ff6b6b}
  .tokchip{font-size:12px;color:var(--mut);display:flex;gap:12px}.tokchip b{font-variant-numeric:tabular-nums;color:var(--ink)}

  main{flex:1;display:flex;min-height:0}
  .pane{min-width:0;position:relative}
  #left{flex:1.02;border-right:1px solid var(--line);display:flex;flex-direction:column;background:radial-gradient(120% 80% at 30% 0%,#121120 0%,#0a0a0f 60%)}
  #right{flex:1.1;display:flex;flex-direction:column;background:var(--bg)}
  .panehead{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--line);font-size:11.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.13em}
  .panehead .legend{display:flex;gap:13px;margin-left:auto;text-transform:none;letter-spacing:0}
  .panehead .legend span{display:flex;align-items:center;gap:6px;color:var(--mut)}
  .dot{width:8px;height:8px;border-radius:50%;box-shadow:0 0 7px currentColor}
  #stage{flex:1}svg{width:100%;height:100%;display:block}

  /* svg nodes */
  .node rect{fill:#191824;stroke:var(--line2);stroke-width:1.4;transition:.3s}
  .node text.nlabel{fill:#e9e6f5;font-size:13px;font-weight:600;text-anchor:middle;dominant-baseline:middle}
  .node text.badge{font-size:8.5px;font-weight:700;text-anchor:middle;letter-spacing:.4px}
  .node{transition:opacity .3s}.node.dim{opacity:.22}
  .node.active rect{stroke:var(--gold);stroke-width:2.4;filter:drop-shadow(0 0 9px rgba(255,207,102,.5))}
  .node.llm rect{stroke:var(--llm);filter:drop-shadow(0 0 10px rgba(255,143,177,.5))}
  .node.code rect{stroke:var(--code);filter:drop-shadow(0 0 10px rgba(82,224,164,.5))}
  .node.hit rect{stroke:var(--hit);filter:drop-shadow(0 0 11px rgba(54,211,153,.55))}
  .node.shared rect{stroke:var(--shared);filter:drop-shadow(0 0 11px rgba(91,156,255,.55))}
  .badge.kllm{fill:var(--llm)}.badge.kcode{fill:var(--code)}.badge.kstore{fill:#8ea2c8}
  .edge{fill:none;stroke:#3a3852;stroke-width:2;opacity:.45;transition:.3s}.edge.on{stroke:var(--gold);opacity:.95}.edge.dim{opacity:.1}
  .flux{fill:var(--gold)}
  .agentdot{fill:#262438;stroke:rgba(255,255,255,.14);stroke-width:1.2;transition:.18s}
  .agentdot.computed{fill:var(--spend);stroke:var(--spend);filter:drop-shadow(0 0 6px rgba(255,154,77,.9))}
  .agentdot.cached{fill:var(--hit);stroke:var(--hit);filter:drop-shadow(0 0 6px rgba(54,211,153,.8))}
  .fanline{stroke:#37344c;stroke-width:1;opacity:.3;transition:.25s}
  .fanline.computed{stroke:var(--spend);opacity:.8}.fanline.cached{stroke:var(--hit);opacity:.65}
  #agentLabel{fill:#f0ecff;font-size:18px;font-weight:700;text-anchor:start}
  #agentSub{fill:var(--mut);font-size:11.5px;text-anchor:start}
  #agentBadge{fill:var(--llm);font-size:11px;font-weight:700;text-anchor:start;letter-spacing:.08em}

  /* right product */
  .srcbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .src{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--mut);background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:5px 10px}
  .src.new{border-color:rgba(54,211,153,.4);color:var(--hit)}
  .src .ic{width:16px;height:16px;border-radius:4px;background:linear-gradient(135deg,#8b6dff,#5b8cff);display:inline-block}
  .src.q .ic{background:linear-gradient(135deg,#52e0a4,#5b8cff)}.src.d .ic{background:linear-gradient(135deg,#ffcf66,#ff9a4d)}
  .srcspace{flex:1}
  .miniact{display:flex;gap:7px}
  .b{border:1px solid var(--line2);background:var(--panel);border-radius:9px;padding:6px 12px;font-size:12.5px;transition:.15s}
  .b:hover{background:var(--panel2);border-color:rgba(255,255,255,.22)}.b:disabled{opacity:.4;cursor:not-allowed}
  .b.pri{background:linear-gradient(92deg,#8b6dff,#6d8bff);border:0;color:#fff;font-weight:600;box-shadow:0 2px 14px rgba(123,108,255,.35)}
  .b.pulse{animation:pulse 1.7s ease-in-out infinite}@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(123,108,255,.0)}50%{box-shadow:0 0 0 4px rgba(123,108,255,.28)}}

  .thread{flex:1;overflow:auto;padding:18px 16px;display:flex;flex-direction:column;gap:16px}
  .empty{margin:auto;text-align:center;color:var(--faint);max-width:300px}
  .empty h3{color:var(--mut);font-weight:600;margin:0 0 6px}
  .turn{display:flex;flex-direction:column;gap:8px}
  .msg{display:flex;gap:10px;align-items:flex-start}
  .msg .ava{width:26px;height:26px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;font-size:11px;font-weight:700;color:#0a0a0f;margin-top:1px}
  .msg.you{flex-direction:row-reverse}
  .msg.you .body{background:linear-gradient(92deg,#3d2f7a,#5b46b8);border:0}
  .msg .body{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:10px 13px;max-width:86%;white-space:pre-wrap}
  .msg .who{font-size:11px;color:var(--faint);margin-bottom:3px}

  /* reasoning block */
  .reasoning{align-self:flex-start;max-width:90%;background:rgba(139,109,255,.06);border:1px solid rgba(139,109,255,.22);border-radius:12px;overflow:hidden;margin-left:36px}
  .rhead{display:flex;align-items:center;gap:9px;padding:8px 12px;cursor:pointer;font-size:12.5px;color:#c7bef5}
  .rhead .rspin{width:12px;height:12px;border-radius:50%;border:2px solid var(--acc);border-top-color:transparent;animation:spin .7s linear infinite;flex:0 0 auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  .rhead .rtitle{font-weight:600}.rhead .rcount{color:var(--faint);font-size:11.5px}
  .rhead .rtog{margin-left:auto;color:var(--faint);background:none;border:0;transition:.2s}
  .reasoning:not(.open) .rbody{display:none}.reasoning:not(.open) .rtog{transform:rotate(-90deg)}
  .rbody{padding:2px 12px 10px 12px;display:flex;flex-direction:column;gap:5px}
  .rstep{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;color:#cfcbe6;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(3px)}to{opacity:1}}
  .rstep .rd{width:6px;height:6px;border-radius:50%;background:var(--acc);margin-top:6px;flex:0 0 auto;box-shadow:0 0 6px var(--acc)}
  .rstep.code .rd{background:var(--code);box-shadow:0 0 6px var(--code)}
  .rstep b{color:#e7e2ff}
  .rprog{height:5px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin:3px 0 1px}
  .rprog i{display:block;height:100%;background:linear-gradient(90deg,var(--spend),var(--hit));transition:width .2s}

  /* answer payloads */
  .answer{align-self:flex-start;max-width:90%;margin-left:36px;display:flex;flex-direction:column;gap:9px}
  .acard{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:11px 13px}
  .acard .atext{white-space:pre-wrap}
  .meta{font-size:11px;color:var(--faint);margin-top:9px;display:flex;gap:7px;flex-wrap:wrap;align-items:center}
  .tag{font-size:10px;border-radius:6px;padding:1px 7px;font-weight:600}
  .tag.path{background:rgba(255,207,102,.15);color:#ffd98a}.tag.hit{background:rgba(54,211,153,.16);color:#7ef0c0}.tag.cost{background:rgba(255,154,77,.14);color:#ffbe8f}
  .cites{display:flex;flex-direction:column;gap:6px;margin-top:9px}
  .cite{font-size:12px;border-left:2px solid rgba(91,156,255,.5);padding:4px 9px;color:#cfdcff;background:rgba(91,156,255,.06);border-radius:0 7px 7px 0}
  .cite .sid{color:#9cc0ff;font-weight:600;font-size:11px}.cite .sim{color:var(--faint);font-size:10.5px;float:right}
  .ranklist{display:flex;flex-direction:column}
  .rk{display:flex;justify-content:space-between;gap:12px;padding:5px 0;border-bottom:1px dashed rgba(255,255,255,.07);font-size:12.5px}
  .rk:last-child{border:0}.rk .s{color:#ffd9a8;font-variant-numeric:tabular-nums;font-weight:600}
  .rk.lead .s{color:var(--hit)}.rk .lbl{color:var(--mut)}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .chip{font-size:11px;border:1px solid var(--line2);border-radius:999px;padding:2px 9px;color:#cfcbe6}
  .chip.q{border-color:rgba(255,143,177,.4);color:#ffc4d6}.chip.n{border-color:rgba(82,224,164,.4);color:#bdf3d6}.chip.d{border-color:rgba(255,207,102,.4);color:#ffe6a8}
  .sys{align-self:center;font-size:11.5px;color:var(--shared);background:rgba(91,156,255,.08);border:1px solid rgba(91,156,255,.25);padding:4px 11px;border-radius:999px}
  .personas{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}
  .pcard{background:rgba(255,255,255,.025);border:1px solid var(--line);border-radius:11px;padding:10px 11px}
  .ph{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
  .pn{font-weight:650;color:#e9e6f5}.psz{font-size:11px;color:var(--llm);font-weight:600}
  .pq{font-size:11.5px;color:#bdb8d8;font-style:italic;margin-top:7px;line-height:1.45}
  .recipe{margin:9px 0 4px}.recipe .rl{display:flex;gap:9px;align-items:flex-start;font-size:12.5px;color:#cfcbe6;padding:3px 0}
  .recipe .rn{width:18px;height:18px;border-radius:50%;background:rgba(139,109,255,.2);color:#c7bef5;display:grid;place-items:center;font-size:11px;font-weight:700;flex:0 0 auto}
  @media (max-width:560px){.personas{grid-template-columns:1fr}}

  /* composer */
  .composer{border-top:1px solid var(--line);padding:11px 13px;display:flex;flex-direction:column;gap:9px;background:linear-gradient(180deg,#0c0c12,#0a0a0f)}
  .scope{font-size:11px;color:#bcd3ff;background:rgba(91,156,255,.1);border:1px solid rgba(91,156,255,.3);border-radius:7px;padding:2px 9px;align-self:flex-start;display:flex;align-items:center;gap:6px}
  .scope .x{cursor:pointer;color:var(--faint)}
  .inwrap{display:flex;align-items:flex-end;gap:8px;background:var(--panel);border:1px solid var(--line2);border-radius:13px;padding:8px 10px}
  .inwrap:focus-within{border-color:rgba(139,109,255,.5)}
  .inwrap textarea{flex:1;background:transparent;border:0;color:var(--ink);outline:none;font:inherit;resize:none;max-height:90px;line-height:1.5}
  .inwrap .sendb{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#8b6dff,#6d8bff);border:0;color:#fff;display:grid;place-items:center;flex:0 0 auto}
  .inwrap .sendb:disabled{opacity:.4}
  .quick{display:flex;gap:6px;flex-wrap:wrap}
  .quick button{font-size:11px;border:1px dashed var(--line2);background:transparent;color:var(--mut);border-radius:8px;padding:3px 9px}
  .quick button:hover{color:var(--ink);border-color:rgba(255,255,255,.3)}
  .toolrow{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
  .toolrow .lbl{font-size:11px;color:var(--faint);margin-right:2px}
  .team{display:flex;margin-left:auto}
  .ava-s{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:10.5px;font-weight:700;margin-left:-5px;border:2px solid var(--bg);color:#0a0a0f;cursor:pointer}
  .ava-s.on{outline:2px solid var(--acc);outline-offset:1px}
</style>
</head>
<body>
<div id="wrap">
  <div class="appbar">
    <div class="logo"><span class="mark"></span>Compass</div>
    <div class="crumb"><b>Reelay</b> / discovery / <b id="crumbUser">live workspace</b></div>
    <div class="livechip"><span class="led" id="led"></span><span id="liveTxt">connecting…</span></div>
    <div class="tokchip"><span>spent <b id="tSpent">0</b></span><span>saved <b id="tSaved">0</b></span></div>
  </div>
  <main>
    <section class="pane" id="left">
      <div class="panehead">backend · the machinery
        <div class="legend">
          <span><i class="dot" style="color:#ff8fb1"></i>LLM</span>
          <span><i class="dot" style="color:#52e0a4"></i>code</span>
          <span><i class="dot" style="color:#36d399"></i>cache hit</span>
          <span><i class="dot" style="color:#5b9cff"></i>shared</span>
        </div>
      </div>
      <div id="stage"><svg id="svg" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet"></svg></div>
    </section>
    <section class="pane" id="right">
      <div class="srcbar" id="srcbar"></div>
      <div class="thread" id="thread"></div>
      <div class="composer">
        <div class="scope" id="scope" style="display:none"></div>
        <div class="inwrap">
          <textarea id="q" rows="1" placeholder="Ask the research…  e.g. what did people say about subscription cost?"></textarea>
          <button class="sendb" id="send" title="Send">➤</button>
        </div>
        <div class="quick" id="quick"></div>
        <div class="toolrow">
          <span class="lbl">on the answer:</span>
          <button class="b" id="promote" disabled>★ Promote</button>
          <button class="b" id="tri">◈ Triangulate #1</button>
          <button class="b" id="deck">▦ Deck</button>
          <button class="b" id="proto">◇ Prototype</button>
          <div class="team" id="team"></div>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
const NS='http://www.w3.org/2000/svg';
const NODES={src:{x:60,y:300,p:'Raw notes',k:'store'},units:{x:205,y:300,p:'Tagged quotes',k:'store'},
 extract:{x:355,y:300,p:'Extract',k:'llm'},canon:{x:510,y:300,p:'Group needs',k:'llm'},
 score:{x:665,y:300,p:'Scorecard',k:'code'},rank:{x:825,y:300,p:'Ranking',k:'store'},
 embed:{x:160,y:480,p:'Search index',k:'store'},quant:{x:60,y:600,p:'Survey',k:'store'},doc:{x:300,y:600,p:'Report',k:'store'},
 tri:{x:560,y:560,p:'Triangulate',k:'code'},router:{x:665,y:135,p:'Router',k:'code'},answer:{x:840,y:135,p:'Answer',k:'store'},
 out_a:{x:825,y:430,p:'Analysis',k:'store'},out_n:{x:825,y:520,p:'Deck',k:'store'},out_p:{x:825,y:610,p:'Prototype',k:'store'}};
const EDGES=[['src','units'],['units','extract'],['extract','canon'],['canon','score'],['score','rank'],
 ['units','embed'],['extract','embed'],['quant','embed'],['doc','embed'],['rank','router'],['embed','router'],['router','answer'],
 ['rank','tri'],['embed','tri'],['rank','out_a'],['out_a','out_n'],['out_a','out_p']];
const W=120,H=50,svg=document.getElementById('svg');
const EL=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
const ctr=id=>({x:NODES[id].x+W/2,y:NODES[id].y+H/2});
const edgeEls={},nodeEls={};
for(const[a,b]of EDGES){const A=ctr(a),B=ctr(b),c=Math.max(40,Math.abs(B.x-A.x)*0.5);
  const p=EL('path',{d:`M ${A.x} ${A.y} C ${A.x+c} ${A.y}, ${B.x-c} ${B.y}, ${B.x} ${B.y}`,class:'edge'});svg.appendChild(p);edgeEls[a+'|'+b]=p;}
for(const id in NODES){const n=NODES[id];const g=EL('g',{class:'node',transform:`translate(${n.x},${n.y})`});
  g.appendChild(EL('rect',{width:W,height:H,rx:11}));
  const l=EL('text',{class:'nlabel',x:W/2,y:H/2+1});l.textContent=n.p;g.appendChild(l);
  const bd=EL('text',{class:'badge k'+n.k,x:W/2,y:H-6});bd.textContent=n.k==='llm'?'LLM':n.k==='code'?'CODE':'STORE';g.appendChild(bd);
  svg.appendChild(g);nodeEls[id]=g;}
const agentG=EL('g',{}); svg.appendChild(agentG);
const agentBadge=EL('text',{id:'agentBadge',x:64,y:52});
const agentLabel=EL('text',{id:'agentLabel',x:64,y:76}); const agentSub=EL('text',{id:'agentSub',x:64,y:96});
svg.appendChild(agentBadge);svg.appendChild(agentLabel);svg.appendChild(agentSub);
const fluxLayer=EL('g',{});svg.appendChild(fluxLayer);
const POOL=70,PER=6,flux=[];for(let i=0;i<POOL;i++){const c=EL('circle',{r:3,class:'flux'});c.style.opacity=0;fluxLayer.appendChild(c);flux.push(c);}
let activeFlows=[],agentDots=[];
function clearL(){for(const id in nodeEls)nodeEls[id].classList.remove('dim','active','llm','code','hit','shared');
  for(const k in edgeEls)edgeEls[k].classList.remove('on','dim');activeFlows=[];}
function light({on=[],llm=[],code=[],hit=[],shared=[],flow=[]}){clearL();
  const set=new Set([...on,...llm,...code,...hit,...shared]);
  for(const id in nodeEls)if(!set.has(id))nodeEls[id].classList.add('dim');
  for(const k in edgeEls){const[a,b]=k.split('|');if(!(set.has(a)&&set.has(b)))edgeEls[k].classList.add('dim');}
  on.forEach(i=>nodeEls[i]?.classList.add('active'));llm.forEach(i=>nodeEls[i]?.classList.add('llm'));
  code.forEach(i=>nodeEls[i]?.classList.add('code'));hit.forEach(i=>nodeEls[i]?.classList.add('hit'));shared.forEach(i=>nodeEls[i]?.classList.add('shared'));
  flow.forEach(([a,b])=>{const p=edgeEls[a+'|'+b];if(p){p.classList.add('on');p.classList.remove('dim');activeFlows.push({path:p,len:p.getTotalLength()});}});}
// Fan-out: from a single dispatch point (the Extract node), radiate a line to every
// per-interview agent. Agents/lines light up one by one as each interview is extracted.
function spawnAgents(total){clearAgents();
  const ox=415,oy=350; // dispatch origin = bottom of the Extract node
  const cols=Math.min(9,total),cw=42,ch=40,sx=455-(cols*cw)/2+cw/2,sy=455;
  for(let i=0;i<total;i++){const r=Math.floor(i/cols),c=i%cols;const x=sx+c*cw,y=sy+r*ch;
    const ln=EL('line',{class:'fanline',x1:ox,y1:oy,x2:x,y2:y});agentG.appendChild(ln);
    const d=EL('circle',{class:'agentdot',r:7,cx:x,cy:y});agentG.appendChild(d);
    agentDots.push({d,ln});}
  agentBadge.textContent='⚡ FAN-OUT';
  agentLabel.textContent=`0 / ${total} agents`;
  agentSub.textContent='one cheap model per interview, in parallel';}
function agentTick(i,status,done,total){const a=agentDots[i];
  if(a){a.d.classList.add(status);a.ln.classList.add(status);
    a.d.setAttribute('r',9);setTimeout(()=>a.d.setAttribute('r',7),160);}
  agentLabel.textContent=`${done} / ${total} agents`;}
function clearAgents(){agentDots.forEach(a=>{a.d.remove();a.ln.remove();});agentDots=[];
  agentBadge.textContent='';agentLabel.textContent='';agentSub.textContent='';}
(function loop(now){let idx=0;const ph=(now/1300)%1;for(const f of activeFlows)for(let i=0;i<PER&&idx<POOL;i++,idx++){
  const u=(ph+i/PER)%1,pt=f.path.getPointAtLength(u*f.len);const c=flux[idx];c.setAttribute('cx',pt.x);c.setAttribute('cy',pt.y);c.style.opacity=.9;}
  for(let i=idx;i<POOL;i++)flux[i].style.opacity=0;requestAnimationFrame(loop);})(0);

/* ---------- streaming client ---------- */
async function stream(path,body,onEvent){
  const res=await fetch('/api'+path,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
  const rd=res.body.getReader(),dec=new TextDecoder();let buf='';
  for(;;){const{value,done}=await rd.read();if(done)break;buf+=dec.decode(value,{stream:true});
    let nl;while((nl=buf.indexOf('\n'))>=0){const line=buf.slice(0,nl);buf=buf.slice(nl+1);if(line.trim())onEvent(JSON.parse(line));}}
}
const api=(path,body)=>fetch('/api'+path,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());
const apiGet=path=>fetch('/api'+path).then(r=>r.json());

/* ---------- UI helpers ---------- */
const $=id=>document.getElementById(id);
const thread=$('thread');
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const div=(c)=>{const d=document.createElement('div');if(c)d.className=c;return d;};
const scroll=()=>{thread.scrollTop=thread.scrollHeight;};
let user='you',lastMid=null,state={},busy=false;
const TEAM={you:{n:'Y',c:'#ffcf66'},alice:{n:'A',c:'#7be0c0'},bob:{n:'B',c:'#9cc0ff'},carol:{n:'C',c:'#ffb3c7'}};
function ava(u){const a=div('ava');a.style.background=(TEAM[u]||TEAM.you).c;a.textContent=(TEAM[u]||TEAM.you).n;return a;}

function userMsg(text){thread.querySelector('.empty')?.remove();const m=div('msg you');m.appendChild(ava(user));const b=div('body');b.textContent=text;m.appendChild(b);thread.appendChild(m);scroll();}
function sysMsg(text){const d=div('sys');d.textContent=text;thread.appendChild(d);scroll();}

const REVEAL=820; // ms between reasoning steps — paced so each real step is readable
function newTurn(){
  const turn=div('turn');
  const reason=div('reasoning open');
  reason.innerHTML=`<div class="rhead"><span class="rspin"></span><span class="rtitle">Reasoning…</span><span class="rcount"></span><button class="rtog">▾</button></div><div class="rbody"></div>`;
  reason.querySelector('.rhead').onclick=()=>reason.classList.toggle('open');
  const ans=div('answer');
  turn.append(reason,ans);thread.appendChild(turn);scroll();
  const body=reason.querySelector('.rbody');let n=0;const t0=performance.now();
  return {
    turn,reason,ans,
    // reveal one real step, then pause so it's readable. {pid} adds a live progress bar.
    async reveal(html,{code,pid,pause=true}={}){
      n++;const el=div('rstep'+(code?' code':''));
      el.innerHTML=`<span class="rd"></span><span class="tx">${html}</span>`;
      if(pid){el.dataset.pid=pid;el.insertAdjacentHTML('beforeend','<div class="rprog" style="flex:1 0 100%;margin-top:5px"><i></i></div>');}
      body.appendChild(el);scroll();
      if(pause)await sleep(REVEAL);
      return el;
    },
    setProgress(pid,frac,html){const el=body.querySelector(`[data-pid="${pid}"]`);if(!el)return;
      if(html)el.querySelector('.tx').innerHTML=html;
      const b=el.querySelector('.rprog i');if(b)b.style.width=Math.round(frac*100)+'%';scroll();},
    async plan(p){n++;const el=div('rstep');
      el.innerHTML=`<span class="rd" style="background:var(--llm)"></span><span class="tx"><b>📝 Wrote a workflow:</b> ${p.recipe.map(esc).join(' <span style="color:#6b6788">→</span> ')}</span>`;
      body.appendChild(el);scroll();await sleep(REVEAL*1.25);},
    finish(){reason.classList.remove('open');reason.querySelector('.rspin').style.display='none';
      reason.querySelector('.rtitle').textContent=`Reasoned in ${n} step${n>1?'s':''}`;
      reason.querySelector('.rcount').textContent=`· ${((performance.now()-t0)/1000).toFixed(1)}s`;}
  };
}

/* ---------- sources / state ---------- */
function renderState(s){state=s;
  $('led').className='led'+(s.hasLive?'':' off');
  $('liveTxt').textContent=`${s.availableIds.length} interviews · semantic search`;
  $('tSpent').textContent=(s.tokens.spent||0).toLocaleString();$('tSaved').textContent=(s.tokens.saved||0).toLocaleString();
  renderSrc(s);renderTools();
}
function renderSrc(s){const sb=$('srcbar');sb.innerHTML='';
  const add=(cls,ic,txt)=>{const d=div('src '+cls);d.innerHTML=`<span class="ic"></span>${txt}`;sb.appendChild(d);};
  add('','',`${s.availableIds.length} interviews ${s.built?'· analysed':''}`);
  add('q','',`survey (CSV)`);add('d','',`market report (PDF)`);
  const sp=div('srcspace');sb.appendChild(sp);
  const act=div('miniact');
  act.innerHTML=`<button class="b ${s.built?'':'pri pulse'}" id="b20">${s.built?'Re-analyse':'Analyse interviews'}</button>
    ${s.built?'<button class="b" id="ball">＋ Add 7 new</button>':''}
    <button class="b" id="reset" title="reset">↺</button>`;
  sb.appendChild(act);
  $('b20').onclick=()=>runBuild([...Array(20)].map((_,i)=>String(i+1).padStart(3,'0')),'20 interviews');
  if($('ball'))$('ball').onclick=()=>runBuild(null,'all 27 (incremental)');
  $('reset').onclick=async()=>{await api('/reset',{});thread.innerHTML='';lastMid=null;clearAgents();clearL();renderState(await apiGet('/state'));};
}
function renderTools(){const t=$('team');t.innerHTML='';['alice','bob','carol'].forEach(u=>{const a=div('ava-s'+(user===u?' on':''));
  a.style.background=TEAM[u].c;a.textContent=TEAM[u].n;a.title='view as '+u;
  a.onclick=()=>{user=(user===u?'you':u);$('crumbUser').textContent=user==='you'?'live workspace':user+'’s view';renderTools();};t.appendChild(a);});
  $('promote').disabled=!lastMid;}

/* ---------- actions ---------- */
async function runBuild(ids,label){
  if(busy)return;busy=true;
  userMsg(`Analyse ${label}.`);
  const T=newTurn();
  light({on:['src','units','extract'],llm:['extract'],flow:[['src','units'],['units','extract']]});
  // 1. collect the REAL events (fast), then 2. play them back at a readable pace.
  const phases=[],agents=[];let result=null;
  await stream('/build',{ids},ev=>{ if(ev.t==='phase')phases.push(ev); else if(ev.t==='agent')agents.push(ev); else if(ev.t==='result')result=ev; });
  const total=agents.length||(ids?ids.length:state.availableIds.length);
  await T.reveal('Reading &amp; fingerprinting interviews <b>(skipping any already analysed)</b>');
  spawnAgents(total);
  await T.reveal(`Fanning out <b>one cheap model per interview</b> — ${total} agents running in parallel`,{pid:'fan'});
  for(let i=0;i<agents.length;i++){const a=agents[i];agentTick(i,a.status,a.done,a.total);
    T.setProgress('fan',a.done/a.total,`Extracting opportunities — <b>${a.done}/${a.total}</b> agents done (${a.status})`);
    await sleep(90);}
  await sleep(300);
  light({on:['extract','canon'],llm:['canon'],flow:[['extract','canon']]});
  const cd=phases.find(p=>p.phase==='canon-done');
  await T.reveal('<b>'+esc(cd?cd.msg:'Grouped needs into themes')+'</b>');
  clearAgents();
  light({on:['canon','score','rank'],code:['score'],flow:[['canon','score'],['score','rank']]});
  const sc=phases.find(p=>p.phase==='score');
  await T.reveal(esc(sc?sc.msg:'Scoring — plain code, no model'),{code:true});
  light({on:['rank'],hit:['rank']});
  const b=result.build;
  await T.reveal(`Done — extracted <b>${b.computed}</b> live${b.cached?`, reused <b>${b.cached}</b> from cache`:''}`,{code:true});
  T.finish();
  const card=div('acard');
  card.innerHTML=`<b>Ranked opportunities</b> · ${b.sources} interviews · ${b.canonical.count} themes
    <div class="ranklist">${result.ranking.slice(0,6).map((r,i)=>`<div class="rk${i===0?' lead':''}"><span class="lbl">${i+1}. ${r.slug}</span><span class="s">${r.score}</span></div>`).join('')}</div>`;
  T.ans.appendChild(card);
  renderState(result);
  busy=false;
}

async function runAsk(){
  if(busy)return;const q=$('q').value.trim();if(!q)return;
  if(!state.built){sysMsg('Analyse the interviews first ↑');return;}
  busy=true;$('q').value='';autosize();
  userMsg(q);
  const T=newTurn();
  const ids=$('scope').dataset.ids?JSON.parse($('scope').dataset.ids):null;
  light({on:['router'],code:['router']});
  const lnode={router:['router'],embed:['embed','router'],answer:['embed','router','answer'],rank:['rank','router','answer'],extract:['units','extract'],canon:['units','extract','canon']};
  // collect real events (fast), then play them back at a readable pace
  const events=[];let result=null;
  await stream('/ask',{question:q,user,ids},ev=>{ if(ev.t==='result')result=ev; else events.push(ev); });
  for(const ev of events){
    if(ev.t==='step'){ if(ev.node&&lnode[ev.node])light({on:lnode[ev.node],code:['router'],flow:ev.node==='embed'?[['embed','router']]:ev.node==='answer'?[['router','answer']]:[]});
      await T.reveal(esc(ev.msg),{code:/cache|Classified|scorecard|Clustering|Built|Re-reading/.test(ev.msg)}); }
    else if(ev.t==='plan'){ await T.plan(ev.plan); }
    else if(ev.t==='phase'&&ev.phase==='extract'){ spawnAgents(ev.total); light({on:['units','extract','canon'],llm:['extract'],flow:[['units','extract']]}); await T.reveal(esc(ev.msg),{pid:'fan'}); }
    else if(ev.t==='agent'){ agentTick(ev.done-1,ev.status,ev.done,ev.total); T.setProgress('fan',ev.done/ev.total,`Re-reading interviews through the new lens — <b>${ev.done}/${ev.total}</b>`); await sleep(70); }
  }
  clearAgents();
  const d=result.decision;lastMid=d.message_id;$('promote').disabled=false;
  T.finish();
  if(d.path==='aggregate')light({on:['rank','router','answer'],hit:['rank'],flow:[['rank','router'],['router','answer']]});
  else if(d.path==='mini_analysis')light({on:['units','extract','canon','rank'],code:['canon'],hit:['rank']});
  else light({on:['embed','router','answer'],code:['router'],hit:d.cache_hit?['answer']:[],flow:[['embed','router'],['router','answer']]});
  if(d.answer.mini){renderMini(T,d.answer.mini);}
  else{
    const card=div('acard');
    let html=`<div class="atext">${esc(d.answer.text.split('\n')[0])}</div>`;
    if(d.answer.citations&&d.answer.citations.length){html+='<div class="cites">'+d.answer.citations.slice(0,5).map(c=>
      `<div class="cite"><span class="sim">sim ${c.similarity??''}</span><span class="sid">${c.source_id}</span> — “${esc((c.quote||'').slice(0,150))}”</div>`).join('')+'</div>';}
    html+=`<div class="meta"><span class="tag path">${d.path}</span>${d.cache_hit?'<span class="tag hit">cache hit · 0 tok</span>':`<span class="tag cost">${d.cost} tok</span>`}<span>${esc(d.rationale)}</span></div>`;
    card.innerHTML=html;T.ans.appendChild(card);
  }
  if(result.tokens)$('tSpent').textContent=(result.tokens.spent||0).toLocaleString();
  busy=false;
}
function renderMini(T,mini){
  if(mini.kind==='personas'){
    const wrap=div('acard');
    wrap.innerHTML=`<b>${esc(mini.title)}</b> <span style="color:var(--faint)">— a new workflow, composed on the fly &amp; run over the cached interviews</span>
      <div class="personas">${mini.payload.personas.map(p=>`
        <div class="pcard"><div class="ph"><span class="pn">${esc(p.name)}</span><span class="psz">${p.size} ppl</span></div>
          <div class="chips">${p.needs.map(n=>`<span class="chip">${esc(n)}</span>`).join('')}</div>
          <div class="pq">“${esc(p.quote)}”</div></div>`).join('')}</div>
      <div class="meta"><span class="tag path">mini-workflow</span><span>persona naming would be an LLM step; clustering + quotes are real over cached data</span></div>`;
    T.ans.appendChild(wrap);
  }else{
    const c=div('acard');
    c.innerHTML=`<b>Authored a “${esc(mini.title)}” workflow</b>
      <div class="recipe">${(mini.recipe||[]).map((s,i)=>`<div class="rl"><span class="rn">${i+1}</span>${esc(s)}</div>`).join('')}</div>
      <div class="meta"><span class="tag cost">needs a model key to run live</span><span>discovery fields are cached; this lens extracts <b>new</b> fields per interview</span></div>`;
    T.ans.appendChild(c);
  }
}

async function promote(){if(!lastMid)return;light({on:['answer'],shared:['answer']});
  await api('/promote',{user,message_id:lastMid});
  sysMsg('★ Promoted to the project — teammates now get this answer instantly (shared cache).');$('promote').disabled=true;}

async function triangulate(){if(!state.built)return;if(busy)return;busy=true;
  const slug=state.ranking[0].slug;userMsg(`How solid is “${slug}”, across all our sources?`);
  const T=newTurn();
  light({on:['rank','quant','doc','embed','tri'],code:['tri'],flow:[['rank','tri'],['quant','embed'],['embed','tri'],['doc','embed']]});
  const r=await api('/triangulate',{slug});const t=r.triangulation;
  await T.reveal('Taking the #1 interview finding',{code:true});
  await T.reveal('Searching the <b>survey</b> and the <b>market report</b> for corroboration…');
  await T.reveal('Reconciling evidence across the three sources',{code:true});T.finish();
  const chips=[`<span class="chip q">interviews · #1: ${slug}</span>`]
    .concat(t.quant.slice(0,2).map(q=>`<span class="chip n">survey · ${q.metric} ${q.value}${q.unit||''}</span>`))
    .concat(t.doc.slice(0,1).map(d=>`<span class="chip d">report · “${esc(d.heading)}”</span>`)).join('');
  const card=div('acard');card.innerHTML=`<b>Triangulated.</b> ${esc(t.corroboration)}<div class="chips">${chips}</div>`;T.ans.appendChild(card);busy=false;}

async function output(tier){if(!state.built||busy)return;busy=true;
  userMsg(tier==='narrative'?'Turn this into a board-ready deck.':'Build a prototype for the top opportunity.');
  const T=newTurn();
  light(tier==='narrative'?{on:['rank','out_a','out_n'],hit:['out_a'],flow:[['rank','out_a'],['out_a','out_n']]}:{on:['out_a','out_p'],hit:['out_a'],flow:[['out_a','out_p']]});
  const r=await api('/output',{tier});const ti=r.tier;
  await T.reveal('Reusing the <b>cached analysis</b> (not re-running it)',{code:true});
  await T.reveal(`Generating ${tier==='narrative'?'deck':'prototype'}…`);T.finish();
  const card=div('acard');card.innerHTML=`Built <b>${ti.kind}</b> ${ti.cache==='hit'?'(reused cached analysis)':''}${ti.from?` · analysis: <b>${ti.from.analysis}</b>`:''}${ti.files?` · ${ti.files.length} file(s)`:''}.`;T.ans.appendChild(card);busy=false;}

/* ---------- composer ---------- */
function autosize(){const t=$('q');t.style.height='auto';t.style.height=Math.min(90,t.scrollHeight)+'px';}
$('q').addEventListener('input',autosize);
$('q').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();runAsk();}});
$('send').onclick=runAsk;$('promote').onclick=promote;$('tri').onclick=triangulate;$('deck').onclick=()=>output('narrative');$('proto').onclick=()=>output('prototype');
const QUICK=[['What is the top opportunity?',null],['What did people say about subscription cost?',[9,13,14,18,24]],['Build personas from these interviews',null],['Map the customer journey',null],['Did anyone mention enterprise SSO pricing?',[1,2,3]]];
$('quick').innerHTML=QUICK.map((x,i)=>`<button data-i="${i}">${x[0]}</button>`).join('');
$('quick').onclick=e=>{const b=e.target.closest('button');if(!b)return;const[q,ids]=QUICK[+b.dataset.i];$('q').value=q;autosize();
  const sc=$('scope');if(ids){sc.style.display='flex';sc.innerHTML=`scope: ${ids.length} interviews <span class="x">✕</span>`;sc.dataset.ids=JSON.stringify(ids);sc.querySelector('.x').onclick=()=>{sc.style.display='none';delete sc.dataset.ids;};}else{sc.style.display='none';delete sc.dataset.ids;}};

apiGet('/state').then(s=>{renderState(s);
  if(!s.built){const e=div('empty');e.innerHTML='<h3>Discovery workspace</h3>Analyse the interviews to build the evidence base, then ask questions in plain language. The panel on the left shows the machinery each action triggers.';thread.appendChild(e);}
});
</script>
